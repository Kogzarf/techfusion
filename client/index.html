<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TechFusion | ResilientNet Intelligence Dashboard</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- Tailwind CSS (for utility classes) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Custom Professional CSS -->
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div id="root"></div>

    <!-- Dependencies -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet.heat@0.2.0/dist/leaflet-heat.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Application Components -->
    <script src="api.js"></script>
    <!-- Note: In-browser Babel requires scripts to be loaded correctly. 
         We'll use type="text/babel" for all our component files. -->
    <script type="text/babel" src="HeatmapMap.js"></script>
    <script type="text/babel" src="MessageFlowMap.js"></script>
    <script type="text/babel" src="SelfHealingPanel.js"></script>
    <script type="text/babel" src="ManagementPanel.js"></script>
    <script type="text/babel" src="App.js"></script>

    <script type="text/babel">
        // Initialize the app
        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>

</html>
